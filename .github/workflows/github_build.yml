name: Build
on:
  workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build
        run: ./gradlew assemblePlayDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          path: app/build/outputs/apk/play/debug/*.apk
